{% extends 'base.html' %}
{% block title %}Главная{% endblock %}
{% block content %}
<h1 class="mb-4">Фильмы</h1>
<div class="row row-cols-1 row-cols-md-4 g-4">
    {% for film in films %}
        <div class="col">
            <div class="card h-100 movie-card">
                <img src="{{ film.poster_url }}" class="card-img-top" alt="{{ film.title }}">
                <div class="card-body">
                    <h5 class="card-title">{{ film.title }}</h5>
                    <p class="card-text">{{ film.release_date|slice:":4" }}</p>
                    <a href="{% url 'film_detail' film.id %}" class="btn btn-primary btn-sm">Подробнее</a>
                </div>
            </div>
        </div>
    {% empty %}
        <p>Нет фильмов. Загрузите их через админку или команду import_popular.</p>
    {% endfor %}
</div>
{% endblock %}
