{% extends 'base.html' %}
{% block title %}Поиск{% endblock %}
{% block content %}
<form method="get" class="row g-3 mb-4">
    <div class="col-md-4"><input name="q" class="form-control" placeholder="Название" value="{{ query }}"></div>
    <div class="col-md-3">
        <select name="genre" class="form-select">
            <option value="">Все жанры</option>
            {% for g in genres %}
                <option value="{{ g.id }}">{{ g.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-3"><input name="person" class="form-control" placeholder="Актёр или режиссёр"></div>
    <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Искать</button></div>
</form>
<div class="row row-cols-1 row-cols-md-4 g-4">
    {% for film in films %}
        <div class="col">
            <div class="card h-100">
                <img src="{{ film.poster_url }}" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">{{ film.title }}</h5>
                    <a href="{% url 'film_detail' film.id %}" class="btn btn-sm btn-primary">Подробнее</a>
                </div>
            </div>
        </div>
    {% empty %}
        <p>Ничего не найдено.</p>
    {% endfor %}
</div>
{% endblock %}
